<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>元飲食店店長サム | デジタル名刺</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;}
body{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;background:#d8d8d8;padding:40px 20px;}
.card{width:100%;max-width:400px;min-height:580px;background:#2d2d2d;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.25);padding:48px 32px 36px;display:flex;flex-direction:column;align-items:center;gap:0;position:relative;overflow:visible;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,.30) 100%);pointer-events:none;}
.inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;}
.avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #c9a84c;box-shadow:0 2px 16px rgba(0,0,0,.25);margin-bottom:16px;}
.logo{max-height:36px;max-width:120px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.4));}
.name{font-size:26px;font-weight:700;color:#ffffff;letter-spacing:.06em;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.6);margin-bottom:4px;}
.name-en{font-size:13px;color:rgba(255,255,255,.75);letter-spacing:.1em;margin-bottom:4px;}
.tagline{font-size:13px;color:rgba(255,255,255,.9);letter-spacing:.06em;text-align:center;margin-bottom:4px;}
.tagline-en{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:4px;}
.company{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:16px;text-align:center;}
.divider{width:60px;height:1px;background:#c9a84c;margin:0 auto 16px;opacity:.8;}
.qr-area{display:flex;flex-direction:column;align-items:center;gap:8px;}
.qr-area canvas,.qr-area img{border-radius:8px;border:3px solid #ffffff;}
.qr-label{font-size:11px;letter-spacing:.08em;}
@media(max-width:450px){body{background:#2d2d2d;padding:0;align-items:flex-start;}.card{border-radius:0;min-height:100vh;max-width:100%;box-shadow:none;}}
</style>
</head>
<body>
<div class="card">
  <div class="inner">
    <img src="images/avatar.jpeg" alt="元飲食店店長サム" class="avatar">
    
    <div class="name">元飲食店店長サム</div>
    
    <div class="tagline">飲食店30年×AI活用の実践者/Kindle著者</div>
    
    
    <div class="divider"></div>
    <div class="qr-area"><div style="width:120px;height:120px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;padding:10px;"><p style="font-size:10px;text-align:center;color:rgba(255,255,255,.6);line-height:1.5">QRコードはURL確定後に再生成</p></div></div>
  </div>
</div>

</body>
</html>
